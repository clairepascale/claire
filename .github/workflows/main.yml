name: claire

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    # ---------------------------------------------------------
    #  CHECKOUT REPOSITORY
    # ---------------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    #  PYTHON SETUP
    # ---------------------------------------------------------
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # ---------------------------------------------------------
    #  BASIC SYSTEM CHECKS (non-blocking)
    # ---------------------------------------------------------
    - name: Pre-flight system checks
      continue-on-error: true
      run: |
        echo "Running basic system checks..."
        uname -a || echo "uname failed"
        df -h || echo "df failed"
        free -m || echo "free failed"
        echo "System checks completed."

    # ---------------------------------------------------------
    #  INSTALL BRAVE BROWSER
    # ---------------------------------------------------------
    - name: Install Brave Browser
      continue-on-error: true
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get update || true
        sudo apt install -y apt-transport-https curl || true
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg || true

        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" \
          | sudo tee /etc/apt/sources.list.d/brave-browser-release.list || true

        sudo apt update || true
        sudo apt install -y brave-browser || true

        echo "Brave installation step finished."

    # ---------------------------------------------------------
    #  INSTALL CLOUDFLARE WARP
    # ---------------------------------------------------------
    - name: Install WARP
      continue-on-error: true
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update || true

        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor \
          --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg || true

        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
          https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list || true

        sudo apt-get update || true
        sudo apt-get install -y --no-install-recommends cloudflare-warp || true

        sudo warp-cli --accept-tos registration new || true
        sudo warp-cli --accept-tos mode warp+doh || true
        sudo warp-cli --accept-tos connect || true

        echo "Waiting for WARP to stabilize..."
        sleep 6

    # ---------------------------------------------------------
    #  VERIFY WARP CONNECTION (non-blocking)
    # ---------------------------------------------------------
    - name: Ensure connection is WARP'ed
      continue-on-error: true
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on" \
          && echo "WARP is active" \
          || echo "WARP not detected, continuing anyway."

    # ---------------------------------------------------------
    #  LOCALE CONFIGURATION
    # ---------------------------------------------------------
    - name: Set Locale
      continue-on-error: true
      run: |
        sudo apt-get install -y tzdata locales || true
        sudo locale-gen en_US.UTF-8 || true
        sudo localectl set-locale LANG="en_US.UTF-8" || true
        export LANG="en_US.UTF-8"
        sudo update-locale || true
        locale -a || true
        locale || true

    # ---------------------------------------------------------
    #  PYTHON DEPENDENCIES
    # ---------------------------------------------------------
    - name: Install Python dependencies
      continue-on-error: true
      run: |
        python -m pip install --upgrade pip wheel || true
        pip install --upgrade seleniumbase pyautogui pymongo python-xlib || true

    # ---------------------------------------------------------
    #  CHROMEDRIVER INSTALL
    # ---------------------------------------------------------
    - name: Install chromedriver
      continue-on-error: true
      run: |
        seleniumbase install chromedriver || true
        echo "Chromedriver installation attempted."

    # ---------------------------------------------------------
    #  EXTRA SANITY CHECKS (non-blocking)
    # ---------------------------------------------------------
    - name: Sanity checks before running script
      continue-on-error: true
      run: |
        echo "Checking Python version..."
        python --version || echo "Python check failed"

        echo "Checking Brave version..."
        brave-browser --version || echo "Brave check failed"

        echo "Checking chromedriver..."
        chromedriver --version || echo "Chromedriver check failed"

    # ---------------------------------------------------------
    #  RUN MAIN SCRIPT
    # ---------------------------------------------------------
    - name: Run cl.py
      continue-on-error: true
      run: |
        echo "Starting main script..."
        python cl.py --brave --incognito --do-not-track --xvfb --screenshot || echo "Script exited with non-zero code"

    # ---------------------------------------------------------
    #  UPLOAD SCREENSHOTS
    # ---------------------------------------------------------
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      with:
        name: seleniumbase-screenshots
        path: ./latest_logs/
        if-no-files-found: ignore
